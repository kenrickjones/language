<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Projeto Samba | Portuguese</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="portuguese_vault.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #22c55e; --text: #f8fafc; --text-dim: #94a3b8; --border: #334155; }
        * { box-sizing: border-box; transition: all 0.2s ease; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-top: env(safe-area-inset-top); }
        .top-nav { width: 100%; display: flex; padding: 12px 15px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .home-link { text-decoration: none; color: var(--text-dim); font-size: 0.75rem; font-weight: 800; border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; background: var(--card); }
        .app-container { max-width: 600px; width: 92%; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        header { width: 100%; text-align: center; padding: 25px 0; }
        nav { display: flex; background: var(--card); padding: 4px; border-radius: 12px; gap: 4px; margin-bottom: 20px; width: 100%; border: 1px solid var(--border); }
        .nav-btn { flex: 1; padding: 12px 5px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 8px; font-weight: 700; font-size: 0.75rem; }
        .nav-btn.active { background: var(--primary); color: white; }
        .content-section { display: none; width: 100%; flex-direction: column; align-items: center; }
        .content-section.active { display: flex; animation: fadeIn 0.3s ease; }
        .diff-toggle { display: flex; background: var(--bg); padding: 4px; border-radius: 10px; margin-bottom: 15px; width: 100%; gap: 4px; border: 1px solid var(--border); }
        .diff-btn { flex: 1; padding: 10px 2px; font-size: 0.6rem; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 6px; font-weight: 800; }
        .diff-btn.active { background: var(--card); color: var(--primary); }
        .flashcard-wrapper { perspective: 1000px; width: 100%; height: 340px; cursor: pointer; margin: 10px 0 15px 0; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; }
        .flashcard-wrapper.is-flipped .flashcard-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 24px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; border: 2px solid var(--primary); text-align: center; background: var(--card); }
        .card-back { background: var(--primary); transform: rotateY(180deg); color: white; }
        .btn-main { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 0 #166534; }
        .btn-hear { background: rgba(255,255,255,0.1); border: 1px solid var(--primary); color: var(--primary); padding: 8px 15px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; margin-top: 15px; cursor: pointer; }
        .card-back .btn-hear { border-color: white; color: white; }
        .pronunciation { font-size: 0.9rem; font-style: italic; color: #dcfce7; margin-top: 8px; }
        .video-list { width: 100%; display: grid; gap: 10px; }
        .video-item { display: flex; align-items: center; background: var(--card); padding: 15px; border-radius: 12px; text-decoration: none; color: white; border: 1px solid var(--border); font-weight: 600; font-size: 0.9rem; }

        /* List tab */
        .list-type-toggle { display: flex; background: var(--bg); padding: 4px; border-radius: 10px; margin-bottom: 15px; width: 100%; gap: 4px; border: 1px solid var(--border); }
        .list-type-btn { flex: 1; padding: 10px 2px; font-size: 0.7rem; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 6px; font-weight: 800; }
        .list-type-btn.active { background: var(--card); color: var(--primary); }
        .list-diff-toggle { display: flex; background: var(--bg); padding: 4px; border-radius: 10px; margin-bottom: 15px; width: 100%; gap: 4px; border: 1px solid var(--border); }
        .list-count { font-size: 0.72rem; color: var(--text-dim); font-weight: 700; margin-bottom: 10px; width: 100%; text-align: right; letter-spacing: 0.03em; }
        .list-table { width: 100%; border-collapse: collapse; }
        .list-table thead th { font-size: 0.65rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: left; }
        .list-table tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
        .list-table tbody tr:last-child { border-bottom: none; }
        .list-table tbody tr:hover, .list-table tbody tr:active { background: rgba(255,255,255,0.04); }
        .list-table tbody td { padding: 13px 10px; vertical-align: middle; }
        .list-native { font-size: 1.15rem; font-weight: 700; color: var(--text); }
        .list-ph { font-size: 0.72rem; font-style: italic; color: var(--text-dim); margin-top: 3px; }
        .list-en { font-size: 0.9rem; color: var(--text-dim); font-weight: 600; }
        .list-hear { background: none; border: 1px solid var(--border); color: var(--text-dim); border-radius: 20px; padding: 5px 10px; font-size: 0.65rem; font-weight: 800; cursor: pointer; white-space: nowrap; }
        .list-hear:hover { border-color: var(--primary); color: var(--primary); }
        .list-scroll { width: 100%; background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }

        /* Prev / Next nav row */
        .card-nav { display: flex; gap: 10px; width: 100%; margin-top: 8px; }
        .btn-prev { flex: 1; padding: 14px; background: var(--card); color: var(--text-dim); border: 1px solid var(--border); border-radius: 14px; font-weight: 800; cursor: pointer; font-size: 0.85rem; }
        .btn-next { flex: 2; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 0 #166534; font-size: 0.85rem; }
        .btn-prev:active { opacity: 0.7; }
        .btn-next:active { opacity: 0.85; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="top-nav"><a href="index.html" class="home-link">← HOME</a></div>
    <div class="app-container">
        <header><h1>PROJETO <span style="color:var(--primary)">SAMBA</span> 🇧🇷</h1></header>
        <nav>
            <button class="nav-btn active" onclick="showTab('words', this)">Words</button>
            <button class="nav-btn" onclick="showTab('phrases', this)">Phrases</button>
            <button class="nav-btn" onclick="showTab('list', this)">List</button>
            <button class="nav-btn" onclick="showTab('test', this)">Test</button>
            <button class="nav-btn" onclick="showTab('watch', this)">Watch</button>
        </nav>

        <div id="words" class="content-section active">
            <div class="diff-toggle">
                <button class="diff-btn active" onclick="setDiff('easy', this)">EASY</button>
                <button class="diff-btn" onclick="setDiff('medium', this)">MED</button>
                <button class="diff-btn" onclick="setDiff('hard', this)">HARD</button>
                <button class="diff-btn" onclick="setDiff('vhard', this)">V. HARD</button>
            </div>
            <div class="flashcard-wrapper" onclick="this.classList.toggle('is-flipped')">
                <div class="flashcard-inner">
                    <div class="card-front">
                        <h2 id="pt-text" style="font-size: 2.2rem; margin:0;">--</h2>
                        <div class="pt-ph-view pronunciation">--</div>
                        <button class="btn-hear" onclick="event.stopPropagation(); speak('pt-text')">🔊 HEAR</button>
                    </div>
                    <div class="card-back">
                        <h2 id="en-text" style="font-size: 1.8rem; margin:0;">--</h2>
                        <div class="pt-ph-view pronunciation">--</div>
                        <button class="btn-hear" onclick="event.stopPropagation(); speak('pt-text')">🔊 HEAR</button>
                    </div>
                </div>
            </div>
            <div class="card-nav">
                <button class="btn-prev" onclick="prevCard('words')">← PREV</button>
                <button class="btn-next" onclick="nextCard('words')">NEXT →</button>
            </div>
        </div>

        <div id="phrases" class="content-section">
            <div class="diff-toggle">
                <button class="diff-btn active" onclick="setDiff('easy', this)">EASY</button>
                <button class="diff-btn" onclick="setDiff('medium', this)">MED</button>
                <button class="diff-btn" onclick="setDiff('hard', this)">HARD</button>
                <button class="diff-btn" onclick="setDiff('vhard', this)">V. HARD</button>
            </div>
            <div class="flashcard-wrapper" onclick="this.classList.toggle('is-flipped')">
                <div class="flashcard-inner">
                    <div class="card-front">
                        <h2 id="phrase-pt" style="font-size: 1.6rem; margin:0;">--</h2>
                        <div class="phrase-ph-view pronunciation">--</div>
                        <button class="btn-hear" onclick="event.stopPropagation(); speak('phrase-pt')">🔊 HEAR</button>
                    </div>
                    <div class="card-back">
                        <h2 id="phrase-en" style="font-size: 1.4rem; margin:0;">--</h2>
                        <div class="phrase-ph-view pronunciation">--</div>
                        <button class="btn-hear" onclick="event.stopPropagation(); speak('phrase-pt')">🔊 HEAR</button>
                    </div>
                </div>
            </div>
            <div class="card-nav">
                <button class="btn-prev" onclick="prevCard('phrases')">← PREV</button>
                <button class="btn-next" onclick="nextCard('phrases')">NEXT →</button>
            </div>
        </div>

        <div id="list" class="content-section">
            <div class="list-type-toggle">
                <button class="list-type-btn active" onclick="setListType('words', this)">WORDS</button>
                <button class="list-type-btn" onclick="setListType('phrases', this)">PHRASES</button>
            </div>
            <div class="diff-toggle">
                <button class="diff-btn active" onclick="setListDiff('easy', this)">EASY</button>
                <button class="diff-btn" onclick="setListDiff('medium', this)">MED</button>
                <button class="diff-btn" onclick="setListDiff('hard', this)">HARD</button>
                <button class="diff-btn" onclick="setListDiff('vhard', this)">V. HARD</button>
            </div>
            <div class="list-count" id="list-count">0 items</div>
            <div class="list-scroll">
                <table class="list-table">
                    <thead>
                        <tr>
                            <th>PORTUGUESE</th>
                            <th>ENGLISH</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="list-body"></tbody>
                </table>
            </div>
        </div>

        <div id="test" class="content-section">
            <h2 id="test-q">--</h2>
            <input type="text" id="test-input" placeholder="Translation..." style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border); background:var(--card); color:white;">
            <button class="btn-main" onclick="checkAnswer()">CHECK</button>
            <p id="feedback"></p>
        </div>

        <div id="watch" class="content-section">
            <div class="video-list">
                <a href="https://www.youtube.com/watch?v=PkZnDv_ZNGk" target="_blank" class="video-item">▶️ Portuguese in 30 Min (Basics)</a>
                <a href="https://www.youtube.com/watch?v=gQkHOcLHpbk" target="_blank" class="video-item">▶️ 100 Phrases for Beginners</a>
                <a href="https://www.youtube.com/watch?v=XQBN3TlPVHo" target="_blank" class="video-item">▶️ Brazilian Pronunciation Guide</a>
                <a href="https://www.youtube.com/watch?v=pBrBCouyIvk" target="_blank" class="video-item">▶️ Essential Verbs (Speaking Brazilian)</a>
                <a href="https://www.youtube.com/c/PortuguesePod101" target="_blank" class="video-item">▶️ PortuguesePod101 Channel →</a>
            </div>
        </div>
    </div>
<script>
    let currentDiff = 'easy';
    let activeMode = 'words';
    let currentCard = null;
    let voices = [];

    // Card history stacks per mode
    const history = { words: [], phrases: [] };
    const pools = { words: {}, phrases: {} };

    function loadVoices() {
        voices = window.speechSynthesis.getVoices();
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    function speak(elemId) {
        window.speechSynthesis.cancel();
        const text = document.getElementById(elemId).innerText;
        const ut = new SpeechSynthesisUtterance(text);
        const ptVoice = voices.find(v => v.lang.startsWith('pt'));
        if(ptVoice) ut.voice = ptVoice;
        ut.lang = 'pt-BR';
        ut.rate = 0.8;
        window.speechSynthesis.speak(ut);
    }

    function getPool(mode) {
        if(!pools[mode][currentDiff]) {
            // Shuffle a copy of the pool
            const src = (typeof PORTUGUESE_LIBRARY !== 'undefined')
                ? [...PORTUGUESE_LIBRARY[mode][currentDiff]]
                : generateFallback(mode);
            pools[mode][currentDiff] = shuffle(src);
        }
        return pools[mode][currentDiff];
    }

    function shuffle(arr) {
        for(let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Fallback demo data if vault not loaded
    function generateFallback(mode) {
        if(mode === 'words') return [
            {pt:'Olá', en:'Hello', ph:'oh-LAH'},
            {pt:'Obrigado', en:'Thank you', ph:'oh-bree-GAH-doo'},
            {pt:'Por favor', en:'Please', ph:'por fah-VOR'},
            {pt:'Água', en:'Water', ph:'AH-gwah'},
            {pt:'Casa', en:'House', ph:'KAH-zah'}
        ];
        return [
            {pt:'Bom dia!', en:'Good morning!', ph:'bom JEE-ah'},
            {pt:'Como vai?', en:'How are you?', ph:'KOH-moo VY'},
            {pt:'Tudo bem.', en:'All good.', ph:'TOO-doo beng'}
        ];
    }

    function showCard(mode, card) {
        document.querySelectorAll('.flashcard-wrapper').forEach(w => w.classList.remove('is-flipped'));
        currentCard = card;
        setTimeout(() => {
            if(mode === 'words') {
                document.getElementById('pt-text').innerText = card.pt;
                document.getElementById('en-text').innerText = card.en;
                document.querySelectorAll('.pt-ph-view').forEach(el => el.innerText = `[ ${card.ph} ]`);
            } else {
                document.getElementById('phrase-pt').innerText = card.pt;
                document.getElementById('phrase-en').innerText = card.en;
                document.querySelectorAll('.phrase-ph-view').forEach(el => el.innerText = `[ ${card.ph} ]`);
            }
        }, 150);
    }

    function nextCard(mode) {
        const pool = getPool(mode);
        const hist = history[mode];
        // Track position: use index stored on pool
        if(!pool._idx && pool._idx !== 0) pool._idx = 0;
        else pool._idx = (pool._idx + 1) % pool.length;

        const card = pool[pool._idx];
        hist.push(pool._idx);
        if(hist.length > 200) hist.shift();
        showCard(mode, card);
    }

    function prevCard(mode) {
        const pool = getPool(mode);
        const hist = history[mode];
        if(hist.length > 1) {
            hist.pop(); // remove current
            pool._idx = hist[hist.length - 1];
        } else {
            pool._idx = ((pool._idx || 0) - 1 + pool.length) % pool.length;
        }
        showCard(mode, pool[pool._idx]);
    }

    function showTab(id, btn) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active'); 
        btn.classList.add('active');
        activeMode = (id === 'words' || id === 'phrases') ? id : activeMode;
        if(id === 'test') startTest();
        else if(id === 'words' || id === 'phrases') nextCard(id);
    }

    function setDiff(diff, btn) {
        currentDiff = diff;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        // Reset pools for new difficulty
        pools[activeMode][currentDiff] = null;
        history[activeMode] = [];
        nextCard(activeMode);
    }

    function startTest() {
        const wPool = (typeof PORTUGUESE_LIBRARY !== 'undefined')
            ? PORTUGUESE_LIBRARY.words[currentDiff]
            : generateFallback('words');
        const pPool = (typeof PORTUGUESE_LIBRARY !== 'undefined')
            ? PORTUGUESE_LIBRARY.phrases[currentDiff]
            : generateFallback('phrases');
        const pool = [...wPool, ...pPool];
        currentCard = pool[Math.floor(Math.random()*pool.length)];
        document.getElementById('test-q').innerText = currentCard.pt;
        document.getElementById('test-input').value = '';
        document.getElementById('feedback').innerText = '';
    }

    function checkAnswer() {
        const ans = document.getElementById('test-input').value.trim().toLowerCase();
        if(ans === currentCard.en.toLowerCase()) {
            document.getElementById('feedback').innerText = "✅ Correct!";
            setTimeout(startTest, 1200);
        } else {
            document.getElementById('feedback').innerText = "❌ Try again!";
        }
    }

    // Allow Enter key in test
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('test-input').addEventListener('keydown', e => {
            if(e.key === 'Enter') checkAnswer();
        });
    });

    // ── List tab ──────────────────────────────────────────
    let listType = 'words';
    let listDiff = 'easy';

    function setListType(type, btn) {
        listType = type;
        document.querySelectorAll('.list-type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderList();
    }

    function setListDiff(diff, btn) {
        listDiff = diff;
        // sync the list-section diff buttons only
        document.querySelectorAll('#list .diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderList();
    }

    function speakText(text) {
        window.speechSynthesis.cancel();
        const ut = new SpeechSynthesisUtterance(text);
        const ptVoice = voices.find(v => v.lang.startsWith('pt'));
        if(ptVoice) ut.voice = ptVoice;
        ut.lang = 'pt-BR';
        ut.rate = 0.8;
        window.speechSynthesis.speak(ut);
    }

    function renderList() {
        const data = (typeof PORTUGUESE_LIBRARY !== 'undefined')
            ? PORTUGUESE_LIBRARY[listType][listDiff]
            : generateFallback(listType);
        const tbody = document.getElementById('list-body');
        const count = document.getElementById('list-count');
        count.innerText = `${data.length} ${listType}`;
        tbody.innerHTML = '';
        data.forEach((item, i) => {
            const native = item.pt;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <div class="list-native">${native}</div>
                    <div class="list-ph">[ ${item.ph} ]</div>
                </td>
                <td><span class="list-en">${item.en}</span></td>
                <td><button class="list-hear" onclick="event.stopPropagation(); speakText('${native.replace(/'/g,"\\'")}')">🔊</button></td>
            `;
            tr.onclick = () => speakText(native);
            tbody.appendChild(tr);
        });
    }

    // patch showTab to render list when switching to it
    const _origShowTab = showTab;
    function showTab(id, btn) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        activeMode = (id === 'words' || id === 'phrases') ? id : activeMode;
        if(id === 'test') startTest();
        else if(id === 'words' || id === 'phrases') nextCard(id);
        else if(id === 'list') renderList();
    }

    nextCard('words');
</script>
</body>
</html>
