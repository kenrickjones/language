<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Samba | Portuguese</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #22c55e; --secondary: #eab308; --accent: #3b82f6; --text: #f8fafc; --text-dim: #94a3b8; --border: #334155; --error: #ef4444; }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .app-container { max-width: 600px; width: 95%; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        header { width: 100%; text-align: center; padding: 20px 0; position: relative; }
        .home-link { position: absolute; left: 0; top: 25px; text-decoration: none; color: var(--text-dim); font-size: 0.8rem; font-weight: bold; border: 1px solid var(--border); padding: 5px 10px; border-radius: 8px; }
        h1 { font-size: 2rem; font-weight: 800; margin: 0; }
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin: 20px 0; }
        .stat-box { background: var(--card); padding: 12px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
        .stat-val { font-size: 1.2rem; font-weight: 800; display: block; color: var(--secondary); }
        .stat-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }
        progress { width: 100%; height: 8px; accent-color: var(--primary); border-radius: 10px; border: none; background: #334155; }
        nav { display: flex; flex-wrap: wrap; background: var(--card); padding: 5px; border-radius: 12px; gap: 5px; margin: 20px 0; border: 1px solid var(--border); width: 100%; }
        .nav-btn { flex: 1; min-width: 60px; padding: 10px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 8px; font-weight: 600; font-size: 0.7rem; }
        .nav-btn.active { background: var(--primary); color: white; }
        .content-section { display: none; width: 100%; animation: fadeIn 0.3s ease; }
        .content-section.active { display: flex; flex-direction: column; align-items: center; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--card); border-radius: 18px; padding: 25px; border: 1px solid var(--border); width: 100%; text-align: center; margin-bottom: 15px; }
        .flashcard-wrapper { perspective: 1000px; width: 100%; height: 320px; cursor: pointer; margin-bottom: 20px; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flashcard-wrapper.is-flipped .flashcard-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; border: 2px solid var(--primary); }
        .card-front { background: var(--card); }
        .card-back { background: var(--primary); transform: rotateY(180deg); }
        .pronunciation { font-size: 1rem; font-style: italic; color: #dcfce7; margin-top: 15px; font-weight: 600; }
        .btn-main { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 0 #166534; }
        .mode-toggle, .diff-toggle { display: flex; background: var(--bg); padding: 4px; border-radius: 10px; margin-bottom: 10px; width: 100%; gap: 4px; }
        .mode-btn, .diff-btn { flex: 1; padding: 8px; font-size: 0.65rem; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 6px; font-weight: bold; border: 1px solid transparent; }
        .mode-btn.active, .diff-btn.active { background: var(--card); color: var(--primary); border-color: var(--border); }
        .video-link-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; width: 100%; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: white; }
    </style>
</head>
<body>
<div class="app-container">
    <header>
        <a href="index.html" class="home-link">🏠 HOME</a>
        <h1>PROJETO <span style="color:var(--primary)">SAMBA</span></h1>
    </header>
    <div class="stats-bar">
        <div class="stat-box"><span class="stat-label">Level</span><span id="lvl-val" class="stat-val">1</span></div>
        <div class="stat-box"><span class="stat-label">XP</span><span id="xp-val" class="stat-val">0</span></div>
        <div class="stat-box"><span class="stat-label">Streak</span><span id="streak-val" class="stat-val">0</span></div>
    </div>
    <progress id="xp-bar" value="0" max="1000"></progress>
    <nav>
        <button class="nav-btn active" onclick="showTab('study', this)">Training</button>
        <button class="nav-btn" onclick="showTab('watch', this)">Watch</button>
        <button class="nav-btn" onclick="showTab('test', this)">Test</button>
        <button class="nav-btn" onclick="showTab('vault', this)">Vault</button>
    </nav>

    <div id="study" class="content-section active">
        <div class="mode-toggle">
            <button class="mode-btn active" id="btn-words" onclick="setMode('words')">WORDS</button>
            <button class="mode-btn" id="btn-phrases" onclick="setMode('phrases')">PHRASES</button>
        </div>
        <div class="diff-toggle">
            <button class="diff-btn active" onclick="setDiff('easy', this)">EASY</button>
            <button class="diff-btn" onclick="setDiff('medium', this)">MED</button>
            <button class="diff-btn" onclick="setDiff('hard', this)">HARD</button>
            <button class="diff-btn" onclick="setDiff('vhard', this)">V. HARD</button>
        </div>
        <div class="flashcard-wrapper" onclick="this.classList.toggle('is-flipped')">
            <div class="flashcard-inner">
                <div class="card-front">
                    <h2 id="pt-text" style="font-size: 1.8rem; padding:10px;">--</h2>
                    <button class="btn-main" style="width:auto; padding:8px 20px; font-size:0.7rem;" onclick="speakCurrent(); event.stopPropagation();">🔊 HEAR</button>
                </div>
                <div class="card-back">
                    <h2 id="en-text" style="font-size: 1.5rem; padding:10px;">--</h2>
                    <div id="phonetic-text" class="pronunciation">--</div>
                </div>
            </div>
        </div>
        <button class="btn-main" onclick="nextCard()">NEXT CARD →</button>
        <div id="deck-status" style="font-size:0.7rem; color:var(--text-dim); margin-top:10px;">Ready</div>
    </div>

    <div id="watch" class="content-section">
        <h3>Immersion Hub</h3>
        <a href="https://www.youtube.com/@StreetSmartBrazil/videos" target="_blank" class="video-link-card"><span>Street Smart Brazil</span> ➔</a>
        <a href="https://www.youtube.com/@PortugueseWithLeo/videos" target="_blank" class="video-link-card"><span>Portuguese With Leo</span> ➔</a>
    </div>

    <div id="test" class="content-section">
        <div id="test-container" class="card">
            <h2 id="test-pt" style="font-size: 1.8rem;">--</h2>
            <input type="text" id="test-input" placeholder="Type answer..." onkeydown="if(event.key==='Enter') checkAnswer()">
            <button class="btn-main" onclick="checkAnswer()">SUBMIT</button>
            <p id="feedback" style="margin-top:10px;"></p>
        </div>
    </div>

    <div id="vault" class="content-section">
        <div class="card"><input type="text" id="v-pt" placeholder="Portuguese"><input type="text" id="v-en" placeholder="English"><button class="btn-main" onclick="addToVault()">SAVE</button></div>
        <div id="vault-list" style="width:100%;"></div>
    </div>
</div>

<script>
    const library = {
        words: {
            easy: [{pt: "Olá", en: "Hello", ph: "Oh-la"}, {pt: "Sim", en: "Yes", ph: "Seem"}, {pt: "Não", en: "No", ph: "Nowm"}, {pt: "Água", en: "Water", ph: "Ah-gwa"}, {pt: "Pão", en: "Bread", ph: "Powm"}],
            medium: [{pt: "Cachorro", en: "Dog", ph: "Ca-sho-ho"}, {pt: "Cozinha", en: "Kitchen", ph: "Co-zee-nya"}, {pt: "Trabalho", en: "Work", ph: "Tra-ba-lyo"}, {pt: "Viagem", en: "Trip", ph: "Vya-zhem"}],
            hard: [{pt: "Empreendimento", en: "Enterprise/Venture", ph: "Em-pree-en-jee-men-to"}, {pt: "Inconstitucional", en: "Unconstitutional", ph: "In-cons-tee-too-syoh-nal"}, {pt: "Amanhecer", en: "Dawn", ph: "A-ma-nye-sehr"}],
            vhard: [{pt: "Saudade", en: "Deep longing/Missing", ph: "Sow-dah-jee"}, {pt: "Desabafar", en: "To vent/Let it out", ph: "De-za-ba-far"}, {pt: "Caprichar", en: "To do something with great care", ph: "Ca-pree-shar"}]
        },
        phrases: {
            easy: [{pt: "Como vai?", en: "How's it going?", ph: "Co-mo vay"}, {pt: "Tudo bem?", en: "Everything okay?", ph: "Too-do bem"}],
            medium: [{pt: "Onde fica o hotel?", en: "Where is the hotel?", ph: "On-jee fee-ca o o-tehl"}, {pt: "Eu quero um café", en: "I want a coffee", ph: "Eu keh-ro um ca-feh"}],
            hard: [{pt: "Você poderia me ajudar?", en: "Could you help me?", ph: "Vo-say po-deh-ree-a me ah-ju-dar"}, {pt: "Quanto tempo demora?", en: "How long does it take?", ph: "Kwan-to tem-po de-mo-ra"}],
            vhard: [{pt: "Mais vale um pássaro na mão do que dois voando", en: "A bird in the hand is worth two in the bush", ph: "Id-i-om"}, {pt: "Enfiar o pé na jaca", en: "To overindulge/To kick over the traces", ph: "Id-i-om"}]
        }
    };

    let xp = parseInt(localStorage.getItem('ps_xp')) || 0;
    let vault = JSON.parse(localStorage.getItem('ps_vault')) || [];
    let currentMode = 'words'; let currentDiff = 'easy'; let sessionDeck = [];

    function updateUI() {
        document.getElementById('xp-val').innerText = xp;
        document.getElementById('lvl-val').innerText = Math.floor(xp / 1000) + 1;
        document.getElementById('xp-bar').value = xp % 1000;
        localStorage.setItem('ps_xp', xp);
        localStorage.setItem('ps_vault', JSON.stringify(vault));
        renderVault();
    }

    function showTab(id, btn) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav .nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active'); btn.classList.add('active');
        if(id === 'test') startTest();
    }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('btn-words').classList.toggle('active', mode === 'words');
        document.getElementById('btn-phrases').classList.toggle('active', mode === 'phrases');
        sessionDeck = []; nextCard();
    }

    function setDiff(diff, btn) {
        currentDiff = diff;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        sessionDeck = []; nextCard();
    }

    function nextCard() {
        if (sessionDeck.length === 0) {
            let base = library[currentMode][currentDiff] || [];
            sessionDeck = [...base].sort(() => Math.random() - 0.5);
        }
        const card = sessionDeck.pop();
        document.getElementById('deck-status').innerText = `${currentMode.toUpperCase()} | ${currentDiff.toUpperCase()}`;
        document.querySelector('.flashcard-wrapper').classList.remove('is-flipped');
        setTimeout(() => {
            document.getElementById('pt-text').innerText = card ? card.pt : "Add more in Vault!";
            document.getElementById('en-text').innerText = card ? card.en : "--";
            document.getElementById('phonetic-text').innerText = card ? card.ph : "--";
        }, 150);
    }

    function speakCurrent() {
        const ut = new SpeechSynthesisUtterance(document.getElementById('pt-text').innerText);
        ut.lang = 'pt-BR'; window.speechSynthesis.speak(ut);
    }

    function startTest() {
        const all = [...library.words.easy, ...library.words.medium, ...library.words.hard, ...library.words.vhard, ...library.phrases.easy];
        window.currentTest = all[Math.floor(Math.random() * all.length)];
        document.getElementById('test-pt').innerText = window.currentTest.pt;
        document.getElementById('test-input').value = "";
        document.getElementById('feedback').innerText = "";
    }

    function checkAnswer() {
        if(document.getElementById('test-input').value.trim().toLowerCase() === window.currentTest.en.toLowerCase()) {
            xp += 25; updateUI(); document.getElementById('feedback').innerText = "Correct! +25 XP"; setTimeout(startTest, 1200);
        } else {
            document.getElementById('feedback').innerText = `Answer: ${window.currentTest.en}`;
        }
    }

    function addToVault() {
        const pt = document.getElementById('v-pt').value, en = document.getElementById('v-en').value;
        if(pt && en) { vault.push({pt, en, ph: "Custom"}); updateUI(); }
    }

    function renderVault() {
        document.getElementById('vault-list').innerHTML = vault.map(i => `<div class="stat-box" style="margin-bottom:5px;">${i.pt}</div>`).join('');
    }

    updateUI(); nextCard();
</script>
</body>
</html>
