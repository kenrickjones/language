<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Samba - Learn Portuguese</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #009739; /* Brazil Green */
            --secondary: #fedd00; /* Brazil Yellow */
            --accent: #012169; /* Brazil Blue */
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            /* Gender Colors */
            --masculine: #3498db;
            --feminine: #e91e63;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, var(--primary), #007a2e);
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            color: var(--secondary);
            font-weight: 600;
            letter-spacing: 1px;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 1rem;
            background: rgba(0,0,0,0.2);
        }

        .nav-btn {
            background: transparent;
            border: 2px solid var(--secondary);
            color: var(--secondary);
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .nav-btn.active {
            background: var(--secondary);
            color: var(--accent);
        }

        main {
            flex: 1;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
            width: 100%;
        }

        .section {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }

        .category-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
            border: 2px solid transparent;
        }

        .category-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .category-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: block;
        }

        .flashcard-container {
            perspective: 1000px;
            width: 100%;
            height: 400px;
            margin-bottom: 2rem;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-back {
            transform: rotateY(180deg);
            border: 3px solid var(--primary);
        }

        .card-label {
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-bottom: 1rem;
        }

        .card-text {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        /* Gender Styling Classes */
        .masculine { color: var(--masculine); text-shadow: 0 0 10px rgba(52, 152, 219, 0.3); }
        .feminine { color: var(--feminine); text-shadow: 0 0 10px rgba(233, 30, 99, 0.3); }

        .audio-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--text);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .audio-btn:hover {
            background: var(--primary);
            transform: scale(1.1);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #475569; color: white; }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2rem;
        }

        .option-btn {
            padding: 1.5rem;
            background: #334155;
            border: 2px solid transparent;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s;
        }

        .option-btn:hover { background: #475569; }
        .option-btn.correct { background: var(--primary); border-color: var(--secondary); }
        .option-btn.wrong { background: #ef4444; }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #334155;
            border-radius: 5px;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--secondary);
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

<header>
    <h1>PROJETO SAMBA</h1>
    <p class="subtitle">Brazilian Portuguese Mastery</p>
</header>

<nav>
    <button class="nav-btn active" onclick="showSection('categories')">Learn</button>
    <button class="nav-btn" onclick="showSection('test')">Test Me</button>
</nav>

<main>
    <section id="categories" class="section active">
        <h2 style="margin-bottom: 1.5rem;">Select a Topic</h2>
        <div class="category-grid" id="categoryGrid"></div>
    </section>

    <section id="flashcards" class="section">
        <div style="margin-bottom: 1rem;">
            <button class="btn-secondary" onclick="showSection('categories')">← Back to Topics</button>
        </div>
        <div class="flashcard-container">
            <div class="flashcard" id="card" onclick="revealCard()">
                <div class="card-front">
                    <span class="card-label">English</span>
                    <div class="card-text" id="engText">Dog</div>
                    <p style="color: var(--text-muted)">Click to reveal translation</p>
                </div>
                <div class="card-back">
                    <span class="card-label">Português</span>
                    <div class="card-text" id="ptText">Cachorro</div>
                    <button class="audio-btn" onclick="event.stopPropagation(); speak(currentCard.pt)">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <p style="margin-top: 1rem; font-size: 0.9rem; color: var(--text-muted)">Click to hear pronunciation</p>
                </div>
            </div>
        </div>
        <div class="controls">
            <button class="btn btn-primary" onclick="nextCard()">Next Word →</button>
        </div>
    </section>

    <section id="test" class="section">
        <div class="progress-bar"><div class="progress-fill" id="testProgress"></div></div>
        <div class="test-container" style="background: var(--card-bg); padding: 2rem; border-radius: 20px; text-align: center;">
            <span class="card-label">Translate this:</span>
            <div class="card-text" id="testQuestion" style="margin: 2rem 0;">Ready?</div>
            <div class="options-grid" id="optionsGrid"></div>
        </div>
    </section>
</main>

<script>
    const WORD_LIBRARY = {
        basics: [
            {pt: 'Olá', en: 'Hello'},
            {pt: 'Obrigado', en: 'Thank you', gender: 'm'},
            {pt: 'Obrigada', en: 'Thank you', gender: 'f'},
            {pt: 'Por favor', en: 'Please'},
            {pt: 'Sim', en: 'Yes'},
            {pt: 'Não', en: 'No'}
        ],
        food: [
            {pt: 'Pão', en: 'Bread', gender: 'm'},
            {pt: 'Água', en: 'Water', gender: 'f'},
            {pt: 'Café', en: 'Coffee', gender: 'm'},
            {pt: 'Cerveja', en: 'Beer', gender: 'f'},
            {pt: 'Arroz', en: 'Rice', gender: 'm'},
            {pt: 'Maçã', en: 'Apple', gender: 'f'}
        ],
        false_friends: [
            {pt: 'Pretender', en: 'To Intend (Not Pretend)'},
            {pt: 'Lanche', en: 'Snack (Not Lunch)', gender: 'm'},
            {pt: 'Novela', en: 'Soap Opera (Not Novel)', gender: 'f'},
            {pt: 'Livraria', en: 'Bookstore (Not Library)', gender: 'f'}
        ],
        slang: [
            {pt: 'Beleza?', en: 'Whats up? / Everything good?'},
            {pt: 'Valeu!', en: 'Thanks / Bye'},
            {pt: 'Mano', en: 'Bro / Dude', gender: 'm'},
            {pt: 'Gata', en: 'Attractive woman', gender: 'f'}
        ]
    };

    let currentCategory = 'basics';
    let currentCardIndex = 0;
    let currentCard = null;

    function init() {
        const grid = document.getElementById('categoryGrid');
        Object.keys(WORD_LIBRARY).forEach(cat => {
            const card = document.createElement('div');
            card.className = 'category-card';
            card.innerHTML = `
                <span class="category-icon">${getIcon(cat)}</span>
                <h3 style="text-transform: capitalize">${cat.replace('_', ' ')}</h3>
                <small>${WORD_LIBRARY[cat].length} words</small>
            `;
            card.onclick = () => startCategory(cat);
            grid.appendChild(card);
        });
    }

    function getIcon(cat) {
        const icons = { basics: '👋', food: '🍎', false_friends: '⚠️', slang: '🇧🇷' };
        return icons[cat] || '📚';
    }

    function showSection(sectionId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(sectionId).classList.add('active');
        
        document.querySelectorAll('.nav-btn').forEach(b => {
            b.classList.toggle('active', b.innerText.toLowerCase().includes(sectionId));
        });

        if(sectionId === 'test') startTest();
    }

    function startCategory(cat) {
        currentCategory = cat;
        currentCardIndex = 0;
        showSection('flashcards');
        loadCard();
    }

    function loadCard() {
        const cardEl = document.getElementById('card');
        cardEl.classList.remove('flipped');
        
        currentCard = WORD_LIBRARY[currentCategory][currentCardIndex];
        document.getElementById('engText').innerText = currentCard.en;
        
        const ptDisplay = document.getElementById('ptText');
        ptDisplay.innerText = currentCard.pt;
        
        // APPLY GENDER STYLING
        ptDisplay.classList.remove('masculine', 'feminine');
        if(currentCard.gender === 'm') ptDisplay.classList.add('masculine');
        if(currentCard.gender === 'f') ptDisplay.classList.add('feminine');
    }

    function revealCard() {
        const card = document.getElementById('card');
        if (!card.classList.contains('flipped')) {
            card.classList.add('flipped');
            // Auto-play removed as requested!
        }
    }

    function nextCard() {
        currentCardIndex = (currentCardIndex + 1) % WORD_LIBRARY[currentCategory].length;
        loadCard();
    }

    // HIGH-QUALITY SPEECH ENGINE
    function speak(text) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        const voices = window.speechSynthesis.getVoices();

        let preferredVoice = voices.find(v => v.lang === 'pt-BR' && v.name.includes('Google')) 
                          || voices.find(v => v.lang === 'pt-BR')
                          || voices.find(v => v.lang.startsWith('pt'));

        if (preferredVoice) utterance.voice = preferredVoice;
        utterance.lang = 'pt-BR';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
    }

    window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };

    function startTest() {
        const allWords = Object.values(WORD_LIBRARY).flat();
        const question = allWords[Math.floor(Math.random() * allWords.length)];
        
        document.getElementById('testQuestion').innerText = question.en;
        const grid = document.getElementById('optionsGrid');
        grid.innerHTML = '';

        const options = [question.pt];
        while(options.length < 4) {
            const randomWord = allWords[Math.floor(Math.random() * allWords.length)].pt;
            if(!options.includes(randomWord)) options.push(randomWord);
        }
        options.sort(() => Math.random() - 0.5);

        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                if(opt === question.pt) {
                    btn.classList.add('correct');
                    speak(opt);
                    setTimeout(startTest, 1000);
                } else {
                    btn.classList.add('wrong');
                }
            };
            grid.appendChild(btn);
        });
    }

    init();
</script>

</body>
</html>
