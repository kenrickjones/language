<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Project Sakura | Japanese</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <script src="japanese_vault.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #f472b6; --secondary: #fbbf24; --text: #f8fafc; --text-dim: #94a3b8; --border: #334155; }
        * { box-sizing: border-box; transition: all 0.2s ease; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-top: env(safe-area-inset-top); }
        .top-nav { width: 100%; display: flex; padding: 12px 15px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .home-link { text-decoration: none; color: var(--text-dim); font-size: 0.75rem; font-weight: 800; border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; background: var(--card); }
        .app-container { max-width: 600px; width: 92%; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        header { width: 100%; text-align: center; padding: 20px 0 10px 0; }
        h1 { font-size: 1.8rem; font-weight: 800; margin: 0; }
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin: 15px 0; }
        .stat-box { background: var(--card); padding: 10px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
        .stat-val { font-size: 1.1rem; font-weight: 800; display: block; color: var(--secondary); }
        .stat-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }
        progress { width: 100%; height: 6px; accent-color: var(--primary); border-radius: 10px; border: none; background: #334155; }
        nav { display: flex; background: var(--card); padding: 4px; border-radius: 12px; gap: 4px; margin: 15px 0; border: 1px solid var(--border); width: 100%; }
        .nav-btn { flex: 1; padding: 12px 5px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 8px; font-weight: 700; font-size: 0.75rem; }
        .nav-btn.active { background: var(--primary); color: white; }
        .content-section { display: none; width: 100%; animation: fadeIn 0.3s ease; flex-direction: column; align-items: center; }
        .content-section.active { display: flex; }
        .diff-toggle { display: flex; background: var(--bg); padding: 4px; border-radius: 10px; margin-bottom: 8px; width: 100%; gap: 4px; border: 1px solid var(--border); }
        .diff-btn { flex: 1; padding: 10px 2px; font-size: 0.65rem; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 6px; font-weight: 800; }
        .diff-btn.active { background: var(--card); color: var(--primary); }
        .flashcard-wrapper { perspective: 1000px; width: 100%; height: 320px; cursor: pointer; margin: 10px 0 20px 0; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; }
        .flashcard-wrapper.is-flipped .flashcard-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 24px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; border: 2px solid var(--primary); text-align: center; }
        .card-front { background: var(--card); }
        .card-back { background: var(--primary); transform: rotateY(180deg); color: white; }
        .btn-main { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 0 #be185d; }
        .romaji { font-size: 1rem; font-style: italic; color: #ffe4e6; margin-top: 10px; }
        .romaji.dark { color: #94a3b8; }
    </style>
</head>
<body>
    <div class="top-nav"><a href="index.html" class="home-link">← HOME</a></div>
    <div class="app-container">
        <header><h1>PROJECT <span style="color:var(--primary)">SAKURA</span> 🌸</h1></header>
        <div class="stats-bar">
            <div class="stat-box"><span class="stat-label">Level</span><span id="lvl-val" class="stat-val">1</span></div>
            <div class="stat-box"><span class="stat-label">XP</span><span id="xp-val" class="stat-val">0</span></div>
            <div class="stat-box"><span class="stat-label">Streak</span><span id="streak-val" class="stat-val">0</span></div>
        </div>
        <progress id="xp-bar" value="0" max="1000"></progress>
        <nav>
            <button class="nav-btn active" onclick="showTab('study', this)">Training</button>
            <button class="nav-btn" onclick="showTab('test', this)">Test</button>
            <button class="nav-btn" onclick="showTab('vault', this)">Vault</button>
        </nav>
        <div id="study" class="content-section active">
            <div class="diff-toggle">
                <button class="diff-btn active" onclick="setDiff('easy', this)">EASY</button>
                <button class="diff-btn" onclick="setDiff('medium', this)">MED</button>
                <button class="diff-btn" onclick="setDiff('hard', this)">HARD</button>
                <button class="diff-btn" onclick="setDiff('vhard', this)">V. HARD</button>
            </div>
            <div class="flashcard-wrapper" onclick="this.classList.toggle('is-flipped')">
                <div class="flashcard-inner">
                    <div class="card-front">
                        <h2 id="jp-text" style="font-size: 2.6rem; margin:0;">--</h2>
                        <div id="front-rj" class="romaji dark">--</div>
                        <button class="btn-main" style="width:auto; padding:8px 20px; font-size:0.7rem; margin-top:20px;" onclick="speakCurrent(); event.stopPropagation();">🔊 HEAR</button>
                    </div>
                    <div class="card-back">
                        <h2 id="en-text" style="font-size: 2rem; margin:0;">--</h2>
                        <div id="back-rj" class="romaji">--</div>
                    </div>
                </div>
            </div>
            <button class="btn-main" onclick="nextCard()">NEXT CARD →</button>
        </div>
    </div>
<script>
    const library = JAPANESE_LIBRARY;
    let xp = parseInt(localStorage.getItem('pj_xp')) || 0;
    let currentDiff = 'easy'; let sessionDeck = [];

    function updateUI() {
        document.getElementById('xp-val').innerText = xp;
        document.getElementById('lvl-val').innerText = Math.floor(xp / 1000) + 1;
        document.getElementById('xp-bar').value = xp % 1000;
        localStorage.setItem('pj_xp', xp);
    }
    function showTab(id, btn) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav .nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active'); btn.classList.add('active');
    }
    function setDiff(diff, btn) {
        currentDiff = diff; document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); sessionDeck = []; nextCard();
    }
    function nextCard() {
        let master = library.words[currentDiff];
        if (sessionDeck.length === 0) { sessionDeck = [...master].sort(() => 0.5 - Math.random()); }
        const card = sessionDeck.pop();
        document.querySelector('.flashcard-wrapper').classList.remove('is-flipped');
        setTimeout(() => {
            document.getElementById('jp-text').innerText = card.jp;
            document.getElementById('front-rj').innerText = `[ ${card.rj} ]`;
            document.getElementById('en-text').innerText = card.en;
            document.getElementById('back-rj').innerText = card.rj;
        }, 150);
    }
    function speakCurrent() {
        window.speechSynthesis.cancel();
        const ut = new SpeechSynthesisUtterance(document.getElementById('jp-text').innerText);
        const v = window.speechSynthesis.getVoices().find(v => v.lang.includes('ja-JP'));
        if(v) ut.voice = v; ut.lang = 'ja-JP'; ut.rate = 0.8; window.speechSynthesis.speak(ut);
    }
    window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    updateUI(); nextCard();
</script>
</body>
</html>
