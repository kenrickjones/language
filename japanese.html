<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Project Sakura | Japanese</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <script src="japanese_vault.js"></script>
    <style>
        :root{--bg:#0f172a;--card:#1e293b;--primary:#f472b6;--shadow:#be185d;--text:#f8fafc;--text-dim:#94a3b8;--border:#334155;}
        *{box-sizing:border-box;transition:all 0.2s ease;-webkit-tap-highlight-color:transparent;}
        body{font-family:'Inter','Noto Sans JP',sans-serif;background-color:var(--bg);color:var(--text);margin:0;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding-top:env(safe-area-inset-top);}
        .top-nav{width:100%;display:flex;padding:12px 15px;background:rgba(15,23,42,0.95);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);}
        .home-link{text-decoration:none;color:var(--text-dim);font-size:0.75rem;font-weight:800;border:1px solid var(--border);padding:6px 14px;border-radius:20px;background:var(--card);}
        .app-container{max-width:600px;width:92%;display:flex;flex-direction:column;align-items:center;padding-bottom:50px;}
        header{width:100%;text-align:center;padding:25px 0;}
        nav{display:flex;background:var(--card);padding:4px;border-radius:12px;gap:4px;margin-bottom:20px;width:100%;border:1px solid var(--border);}
        .nav-btn{flex:1;padding:10px 2px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;border-radius:8px;font-weight:700;font-size:0.65rem;}
        .nav-btn.active{background:var(--primary);color:white;}
        .content-section{display:none;width:100%;flex-direction:column;align-items:center;}
        .content-section.active{display:flex;animation:fadeIn 0.3s ease;}
        .cat-scroll-wrap{width:100%;overflow-x:auto;overflow-y:visible;margin-bottom:15px;-webkit-overflow-scrolling:touch;scrollbar-width:none;min-width:0;}
        .cat-scroll-wrap::-webkit-scrollbar{display:none;}
        .cat-scroll{display:flex;gap:8px;padding:4px 2px;width:max-content;}
        #list-words-controls{width:100%;overflow:hidden;min-width:0;} #test-cat-section{width:100%;overflow:hidden;min-width:0;}
        .cat-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 14px;background:var(--card);border:2px solid var(--border);border-radius:14px;cursor:pointer;color:var(--text-dim);font-size:0.6rem;font-weight:800;text-transform:uppercase;letter-spacing:0.04em;white-space:nowrap;}
        .cat-btn .cat-icon{font-size:1.4rem;line-height:1;}
        .cat-btn.active{border-color:var(--primary);color:var(--primary);background:rgba(244,114,182,0.08);}
        .diff-toggle{display:flex;background:var(--bg);padding:4px;border-radius:10px;margin-bottom:15px;width:100%;gap:4px;border:1px solid var(--border);}
        .diff-btn{flex:1;padding:10px 2px;font-size:0.6rem;border:none;background:transparent;color:var(--text-dim);cursor:pointer;border-radius:6px;font-weight:800;}
        .diff-btn.active{background:var(--card);color:var(--primary);}
        .flashcard-wrapper{perspective:1000px;width:100%;height:340px;cursor:pointer;margin:10px 0 15px 0;}
        .flashcard-inner{position:relative;width:100%;height:100%;transition:transform 0.5s;transform-style:preserve-3d;}
        .flashcard-wrapper.is-flipped .flashcard-inner{transform:rotateY(180deg);}
        .card-front,.card-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:24px;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:25px;border:2px solid var(--primary);text-align:center;background:var(--card);}
        .card-back{background:var(--primary);transform:rotateY(180deg);color:white;}
        .btn-hear{background:rgba(255,255,255,0.1);border:1px solid var(--primary);color:var(--primary);padding:8px 15px;border-radius:20px;font-size:0.7rem;font-weight:800;margin-top:15px;cursor:pointer;}
        .card-back .btn-hear{border-color:white;color:white;}
        .romaji{font-size:1rem;font-style:italic;color:#ffe4e6;margin-top:10px;}
        .card-counter{font-size:0.7rem;font-weight:800;color:var(--text-dim);margin-top:10px;}
        .card-nav{display:flex;gap:10px;width:100%;margin-top:8px;}
        .btn-prev{flex:1;padding:14px;background:var(--card);color:var(--text-dim);border:1px solid var(--border);border-radius:14px;font-weight:800;cursor:pointer;font-size:0.85rem;}
        .btn-next{flex:2;padding:14px;background:var(--primary);color:white;border:none;border-radius:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 var(--shadow);font-size:0.85rem;}
        .btn-prev:active{opacity:0.7;}.btn-next:active{opacity:0.85;}
        .list-type-toggle{display:flex;background:var(--bg);padding:4px;border-radius:10px;margin-bottom:15px;width:100%;gap:4px;border:1px solid var(--border);}
        .list-type-btn{flex:1;padding:10px 2px;font-size:0.7rem;border:none;background:transparent;color:var(--text-dim);cursor:pointer;border-radius:6px;font-weight:800;}
        .list-type-btn.active{background:var(--card);color:var(--primary);}
        .list-count{font-size:0.72rem;color:var(--text-dim);font-weight:700;margin-bottom:10px;width:100%;text-align:right;}
        .list-scroll{width:100%;background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden;}
        .list-table{width:100%;border-collapse:collapse;}
        .list-table thead th{font-size:0.65rem;font-weight:800;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;}
        .list-table tbody tr{border-bottom:1px solid var(--border);cursor:pointer;}
        .list-table tbody tr:last-child{border-bottom:none;}
        .list-table tbody tr:hover{background:rgba(255,255,255,0.04);}
        .list-table tbody td{padding:13px 10px;vertical-align:middle;}
        .list-native{font-size:1.25rem;font-weight:700;color:var(--text);}
        .list-ph{font-size:0.7rem;font-style:italic;color:var(--text-dim);margin-top:3px;}
        .list-en{font-size:0.88rem;color:var(--text-dim);font-weight:600;}
        .list-hear{background:none;border:1px solid var(--border);color:var(--text-dim);border-radius:20px;padding:5px 10px;font-size:0.65rem;font-weight:800;cursor:pointer;white-space:nowrap;}
        .list-hear:hover{border-color:var(--primary);color:var(--primary);}
        .test-setup{width:100%;display:flex;flex-direction:column;gap:20px;}
        .setup-label{font-size:0.68rem;font-weight:800;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;}
        .setup-row{display:flex;gap:8px;width:100%;flex-wrap:wrap;}
        .setup-opt{flex:1;min-width:70px;padding:14px 6px;background:var(--card);border:2px solid var(--border);border-radius:12px;color:var(--text-dim);font-weight:800;font-size:0.78rem;cursor:pointer;text-align:center;}
        .setup-opt.active{border-color:var(--primary);color:var(--primary);background:rgba(244,114,182,0.08);}
        .btn-start-test{width:100%;padding:18px;background:var(--primary);color:white;border:none;border-radius:14px;font-weight:800;font-size:1rem;cursor:pointer;box-shadow:0 4px 0 var(--shadow);margin-top:4px;}
        .test-quiz{width:100%;display:none;flex-direction:column;align-items:center;}
        .quiz-meta{display:flex;justify-content:space-between;width:100%;margin-bottom:10px;font-size:0.72rem;font-weight:800;color:var(--text-dim);}
        .quiz-progress-bar{width:100%;height:6px;background:var(--border);border-radius:3px;margin-bottom:20px;overflow:hidden;}
        .quiz-progress-fill{height:100%;background:var(--primary);border-radius:3px;transition:width 0.4s ease;}
        .quiz-question-box{width:100%;background:var(--card);border:2px solid var(--primary);border-radius:20px;padding:28px 22px;text-align:center;margin-bottom:18px;}
        .quiz-q-label{font-size:0.65rem;font-weight:800;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;}
        .quiz-q-text{font-size:2.2rem;font-weight:800;color:var(--text);line-height:1.25;}
        .quiz-q-phonetic{font-size:0.85rem;font-style:italic;color:var(--text-dim);margin-top:8px;min-height:1.2em;}
        .quiz-q-hear{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:6px 14px;border-radius:20px;font-size:0.68rem;font-weight:800;margin-top:10px;cursor:pointer;}
        .quiz-q-hear:hover{border-color:var(--primary);color:var(--primary);}
        .quiz-options{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
        .quiz-opt{padding:16px 10px;background:var(--card);border:2px solid var(--border);border-radius:14px;color:var(--text);font-weight:700;font-size:0.85rem;cursor:pointer;text-align:center;line-height:1.3;}
        .quiz-opt:hover:not(:disabled){border-color:var(--primary);}
        .quiz-opt.correct{border-color:#22c55e;background:rgba(34,197,94,0.15);color:#22c55e;}
        .quiz-opt.wrong{border-color:#ef4444;background:rgba(239,68,68,0.12);color:#ef4444;}
        .quiz-opt.reveal{border-color:#22c55e;background:rgba(34,197,94,0.1);color:#22c55e;}
        .quiz-opt:disabled{cursor:default;}
        .test-results{width:100%;display:none;flex-direction:column;align-items:center;}
        .score-ring-wrap{position:relative;width:150px;height:150px;margin:8px auto 18px;}
        .score-ring-wrap svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
        .score-ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
        .score-big{font-size:3rem;font-weight:800;line-height:1;}
        .score-denom{font-size:0.82rem;color:var(--text-dim);font-weight:700;}
        .results-grade{font-size:1.3rem;font-weight:800;margin-bottom:5px;}
        .results-sub{font-size:0.85rem;color:var(--text-dim);margin-bottom:22px;text-align:center;}
        .results-breakdown{width:100%;display:flex;flex-direction:column;gap:8px;margin-bottom:22px;}
        .result-row{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:12px;padding:12px 14px;border:1px solid var(--border);}
        .result-row.r-correct{border-color:rgba(34,197,94,0.25);}
        .result-row.r-wrong{border-color:rgba(239,68,68,0.3);}
        .result-icon{font-size:1.1rem;flex-shrink:0;}
        .result-q{font-size:1rem;font-weight:700;color:var(--text);}
        .result-a{font-size:0.78rem;color:var(--text-dim);}
        .btn-retry{width:100%;padding:16px;background:var(--primary);color:white;border:none;border-radius:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 var(--shadow);font-size:0.95rem;}
        .video-list{width:100%;display:grid;gap:10px;}
        .video-item{display:flex;align-items:center;background:var(--card);padding:15px;border-radius:12px;text-decoration:none;color:white;border:1px solid var(--border);font-weight:600;font-size:0.9rem;}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    </style>
</head>
<body>
<div class="top-nav"><a href="index.html" class="home-link">← HOME</a></div>
<div class="app-container">
    <header><h1>PROJECT <span style="color:var(--primary)">SAKURA</span> 🌸</h1></header>
    <nav>
        <button class="nav-btn active" onclick="showTab('words',this)">Words</button>
        <button class="nav-btn" onclick="showTab('phrases',this)">Phrases</button>
        <button class="nav-btn" onclick="showTab('list',this)">List</button>
        <button class="nav-btn" onclick="showTab('test',this)">Test</button>
        <button class="nav-btn" onclick="showTab('watch',this)">Watch</button>
    </nav>

    <div id="words" class="content-section active">
        <div class="cat-scroll-wrap"><div class="cat-scroll" id="words-cat-scroll"></div></div>
        <div class="flashcard-wrapper" onclick="this.classList.toggle('is-flipped')">
            <div class="flashcard-inner">
                <div class="card-front">
                    <h2 id="jp-text" style="font-size:2.6rem;margin:0">--</h2>
                    <div class="jp-rj-view romaji">--</div>
                    <button class="btn-hear" onclick="event.stopPropagation();speak('jp-text')">🔊 HEAR</button>
                    <div class="card-counter" id="words-counter"></div>
                </div>
                <div class="card-back">
                    <h2 id="en-text" style="font-size:2rem;margin:0">--</h2>
                    <div class="jp-rj-view romaji">--</div>
                    <button class="btn-hear" onclick="event.stopPropagation();speak('jp-text')">🔊 HEAR</button>
                </div>
            </div>
        </div>
        <div class="card-nav">
            <button class="btn-prev" onclick="prevCard()">← PREV</button>
            <button class="btn-next" onclick="nextCard()">NEXT →</button>
        </div>
    </div>

    <div id="phrases" class="content-section">
        <div class="diff-toggle">
            <button class="diff-btn active" onclick="setPhraseDiff('easy',this)">EASY</button>
            <button class="diff-btn" onclick="setPhraseDiff('medium',this)">MED</button>
            <button class="diff-btn" onclick="setPhraseDiff('hard',this)">HARD</button>
            <button class="diff-btn" onclick="setPhraseDiff('vhard',this)">V.HARD</button>
        </div>
        <div class="flashcard-wrapper" onclick="this.classList.toggle('is-flipped')">
            <div class="flashcard-inner">
                <div class="card-front">
                    <h2 id="phrase-jp" style="font-size:1.8rem;margin:0">--</h2>
                    <div class="phrase-rj-view romaji">--</div>
                    <button class="btn-hear" onclick="event.stopPropagation();speak('phrase-jp')">🔊 HEAR</button>
                </div>
                <div class="card-back">
                    <h2 id="phrase-en" style="font-size:1.6rem;margin:0">--</h2>
                    <div class="phrase-rj-view romaji">--</div>
                    <button class="btn-hear" onclick="event.stopPropagation();speak('phrase-jp')">🔊 HEAR</button>
                </div>
            </div>
        </div>
        <div class="card-nav">
            <button class="btn-prev" onclick="prevPhrase()">← PREV</button>
            <button class="btn-next" onclick="nextPhrase()">NEXT →</button>
        </div>
    </div>

    <div id="list" class="content-section">
        <div class="list-type-toggle">
            <button class="list-type-btn active" onclick="setListType('words',this)">WORDS</button>
            <button class="list-type-btn" onclick="setListType('phrases',this)">PHRASES</button>
        </div>
        <div id="list-words-controls"><div class="cat-scroll-wrap"><div class="cat-scroll" id="list-cat-scroll"></div></div></div>
        <div id="list-phrases-controls" style="display:none;">
            <div class="diff-toggle">
                <button class="diff-btn active" onclick="setListPhraseDiff('easy',this)">E
