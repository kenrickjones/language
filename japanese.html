<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Project Sakura | Japanese</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <script src="japanese_vault.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #f472b6; --text: #f8fafc; --text-dim: #94a3b8; --border: #334155; }
        * { box-sizing: border-box; transition: all 0.2s ease; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-top: env(safe-area-inset-top); }
        .top-nav { width: 100%; display: flex; padding: 12px 15px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .home-link { text-decoration: none; color: var(--text-dim); font-size: 0.75rem; font-weight: 800; border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; background: var(--card); }
        .app-container { max-width: 600px; width: 92%; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        header { width: 100%; text-align: center; padding: 25px 0; }
        nav { display: flex; background: var(--card); padding: 4px; border-radius: 12px; gap: 4px; margin-bottom: 20px; width: 100%; border: 1px solid var(--border); }
        .nav-btn { flex: 1; padding: 12px 5px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 8px; font-weight: 700; font-size: 0.75rem; }
        .nav-btn.active { background: var(--primary); color: white; }
        .content-section { display: none; width: 100%; flex-direction: column; align-items: center; }
        .content-section.active { display: flex; animation: fadeIn 0.3s ease; }
        .diff-toggle { display: flex; background: var(--bg); padding: 4px; border-radius: 10px; margin-bottom: 15px; width: 100%; gap: 4px; border: 1px solid var(--border); }
        .diff-btn { flex: 1; padding: 10px 2px; font-size: 0.6rem; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 6px; font-weight: 800; }
        .diff-btn.active { background: var(--card); color: var(--primary); }
        .flashcard-wrapper { perspective: 1000px; width: 100%; height: 320px; cursor: pointer; margin: 10px 0 20px 0; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; }
        .flashcard-wrapper.is-flipped .flashcard-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 24px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; border: 2px solid var(--primary); text-align: center; background: var(--card); }
        .card-back { background: var(--primary); transform: rotateY(180deg); color: white; }
        .btn-main { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 0 #be185d; }
        .romaji { font-size: 1rem; font-style: italic; color: #ffe4e6; margin-top: 10px; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: white; font-size: 1rem; margin-bottom: 10px; outline: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="top-nav"><a href="index.html" class="home-link">← HOME</a></div>
    <div class="app-container">
        <header><h1>PROJECT <span style="color:var(--primary)">SAKURA</span> 🌸</h1></header>
        <nav>
            <button class="nav-btn active" onclick="showTab('words', this)">Words</button>
            <button class="nav-btn" onclick="showTab('phrases', this)">Phrases</button>
            <button class="nav-btn" onclick="showTab('test', this)">Test</button>
            <button class="nav-btn" onclick="showTab('watch', this)">Watch</button>
        </nav>

        <div id="words" class="content-section active">
            <div class="diff-toggle">
                <button class="diff-btn active" onclick="setDiff('easy', this)">EASY</button>
                <button class="diff-btn" onclick="setDiff('medium', this)">MED</button>
                <button class="diff-btn" onclick="setDiff('hard', this)">HARD</button>
                <button class="diff-btn" onclick="setDiff('vhard', this)">V. HARD</button>
            </div>
            <div class="flashcard-wrapper" onclick="this.classList.toggle('is-flipped')">
                <div class="flashcard-inner">
                    <div class="card-front">
                        <h2 id="jp-text" style="font-size: 2.6rem; margin:0;">--</h2>
                        <div class="jp-rj-view romaji" style="color:var(--text-dim)">--</div>
                        <button class="btn-main" style="width:auto; padding:8px 20px; font-size:0.7rem; margin-top:20px;" onclick="event.stopPropagation(); speakCurrent('jp-text');">🔊 HEAR</button>
                    </div>
                    <div class="card-back">
                        <h2 id="en-text" style="font-size: 2rem; margin:0;">--</h2>
                        <div class="jp-rj-view romaji">--</div>
                    </div>
                </div>
            </div>
            <button class="btn-main" onclick="nextCard('words')">NEXT WORD →</button>
        </div>

        <div id="phrases" class="content-section">
            <div class="diff-toggle">
                <button class="diff-btn active" onclick="setDiff('easy', this)">EASY</button>
                <button class="diff-btn" onclick="setDiff('medium', this)">MED</button>
                <button class="diff-btn" onclick="setDiff('hard', this)">HARD</button>
                <button class="diff-btn" onclick="setDiff('vhard', this)">V. HARD</button>
            </div>
            <div class="flashcard-wrapper" onclick="this.classList.toggle('is-flipped')">
                <div class="flashcard-inner">
                    <div class="card-front">
                        <h2 id="phrase-jp" style="font-size: 1.8rem; margin:0;">--</h2>
                        <div class="phrase-rj-view romaji" style="color:var(--text-dim)">--</div>
                        <button class="btn-main" style="width:auto; padding:8px 20px; font-size:0.7rem; margin-top:20px;" onclick="event.stopPropagation(); speakCurrent('phrase-jp');">🔊 HEAR</button>
                    </div>
                    <div class="card-back">
                        <h2 id="phrase-en" style="font-size: 1.6rem; margin:0;">--</h2>
                        <div class="phrase-rj-view romaji">--</div>
                    </div>
                </div>
            </div>
            <button class="btn-main" onclick="nextCard('phrases')">NEXT PHRASE →</button>
        </div>

        <div id="test" class="content-section">
            <div style="background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); width: 100%; text-align: center;">
                <h2 id="test-q" style="font-size: 2.2rem;">--</h2>
                <input type="text" id="test-input" placeholder="Meaning in English..." autocomplete="off">
                <button class="btn-main" onclick="checkAnswer()">SUBMIT</button>
                <p id="feedback" style="margin-top:15px; font-weight:bold;"></p>
            </div>
        </div>

        <div id="watch" class="content-section">
            <iframe id="jp-player" width="100%" height="315" src="https://www.youtube.com/embed?listType=playlist&list=PL7uH9jN7X0Wv0TfD_N4G0oGf_4mP_rT5c" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen style="border-radius:20px; border:2px solid var(--primary);"></iframe>
        </div>
    </div>

<script>
    let currentDiff = 'easy';
    let activeMode = 'words';
    let currentCard = null;

    function showTab(id, btn) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active'); 
        btn.classList.add('active');
        activeMode = (id === 'words' || id === 'phrases') ? id : activeMode;
        if(id === 'test') startTest();
        else if(id === 'words' || id === 'phrases') nextCard(id);
    }

    function setDiff(diff, btn) {
        currentDiff = diff;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        nextCard(activeMode);
    }

    function nextCard(mode) {
        const pool = JAPANESE_LIBRARY[mode][currentDiff];
        currentCard = pool[Math.floor(Math.random() * pool.length)];
        document.querySelectorAll('.flashcard-wrapper').forEach(w => w.classList.remove('is-flipped'));
        
        setTimeout(() => {
            if(mode === 'words') {
                document.getElementById('jp-text').innerText = currentCard.jp;
                document.getElementById('en-text').innerText = currentCard.en;
                document.querySelectorAll('.jp-rj-view').forEach(el => el.innerText = `[ ${currentCard.rj} ]`);
            } else {
                document.getElementById('phrase-jp').innerText = currentCard.jp;
                document.getElementById('phrase-en').innerText = currentCard.en;
                document.querySelectorAll('.phrase-rj-view').forEach(el => el.innerText = `[ ${currentCard.rj} ]`);
            }
        }, 150);
    }

    function speakCurrent(elemId) {
        window.speechSynthesis.cancel();
        const ut = new SpeechSynthesisUtterance(document.getElementById(elemId).innerText);
        const voices = window.speechSynthesis.getVoices();
        ut.voice = voices.find(v => v.lang.includes('ja-JP')) || voices.find(v => v.lang.includes('ja'));
        ut.lang = 'ja-JP';
        ut.rate = 0.75;
        window.speechSynthesis.speak(ut);
    }

    function startTest() {
        const pool = [...JAPANESE_LIBRARY.words[currentDiff], ...JAPANESE_LIBRARY.phrases[currentDiff]];
        currentCard = pool[Math.floor(Math.random()*pool.length)];
        document.getElementById('test-q').innerText = currentCard.jp;
        document.getElementById('test-input').value = "";
        document.getElementById('feedback').innerText = "";
    }

    function checkAnswer() {
        if(document.getElementById('test-input').value.trim().toLowerCase() === currentCard.en.toLowerCase()) {
            document.getElementById('feedback').innerText = "✅ Correct!";
            setTimeout(startTest, 1200);
        } else {
            document.getElementById('feedback').innerText = "❌ Incorrect!";
        }
    }
    window.speechSynthesis.getVoices();
    nextCard('words');
</script>
</body>
</html>
