<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Sakura | Japanese</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #f472b6; --secondary: #fbbf24; --accent: #8b5cf6; --text: #f8fafc; --text-dim: #94a3b8; --border: #334155; --error: #ef4444; }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .app-container { max-width: 600px; width: 95%; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        header { width: 100%; text-align: center; padding: 30px 0; }
        h1 { font-size: 2.2rem; font-weight: 800; margin: 0; }
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin: 20px 0; }
        .stat-box { background: var(--card); padding: 12px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
        .stat-val { font-size: 1.2rem; font-weight: 800; display: block; color: var(--secondary); }
        .stat-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }
        progress { width: 100%; height: 8px; accent-color: var(--primary); border-radius: 10px; border: none; background: #334155; }
        nav { display: flex; flex-wrap: wrap; background: var(--card); padding: 5px; border-radius: 12px; gap: 5px; margin: 20px 0; border: 1px solid var(--border); width: 100%; }
        .nav-btn { flex: 1; min-width: 70px; padding: 10px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 8px; font-weight: 600; font-size: 0.7rem; }
        .nav-btn.active { background: var(--primary); color: white; }
        .content-section { display: none; width: 100%; animation: fadeIn 0.3s ease; }
        .content-section.active { display: flex; flex-direction: column; align-items: center; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--card); border-radius: 18px; padding: 25px; border: 1px solid var(--border); width: 100%; text-align: center; margin-bottom: 15px; }
        .flashcard-wrapper { perspective: 1000px; width: 100%; height: 320px; cursor: pointer; margin-bottom: 20px; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flashcard-wrapper.is-flipped .flashcard-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; border: 2px solid var(--primary); }
        .card-front { background: var(--card); }
        .card-back { background: var(--primary); transform: rotateY(180deg); }
        .romaji { font-size: 1.1rem; font-style: italic; color: #ffe4e6; margin-top: 15px; font-weight: 600; }
        .btn-main { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 0 #be185d; }
        .video-link-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; width: 100%; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: white; }
        .mode-toggle { display: flex; background: var(--bg); padding: 4px; border-radius: 10px; margin-bottom: 15px; width: 100%; }
        .mode-btn { flex: 1; padding: 8px; font-size: 0.75rem; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 6px; font-weight: bold; }
        .mode-btn.active { background: var(--card); color: var(--primary); border: 1px solid var(--border); }
    </style>
</head>
<body>
<div class="app-container">
    <header><h1>PROJECT <span style="color:var(--primary)">SAKURA</span> 🌸</h1></header>
    <div class="stats-bar">
        <div class="stat-box"><span class="stat-label">Level</span><span id="lvl-val" class="stat-val">1</span></div>
        <div class="stat-box"><span class="stat-label">XP</span><span id="xp-val" class="stat-val">0</span></div>
        <div class="stat-box"><span class="stat-label">Streak</span><span id="streak-val" class="stat-val">0</span></div>
    </div>
    <progress id="xp-bar" value="0" max="1000"></progress>
    <nav>
        <button class="nav-btn active" onclick="showTab('study', this)">Training</button>
        <button class="nav-btn" onclick="showTab('watch', this)">Watch</button>
        <button class="nav-btn" onclick="showTab('test', this)">Test</button>
        <button class="nav-btn" onclick="showTab('vault', this)">Vault</button>
    </nav>

    <div id="study" class="content-section active">
        <div class="mode-toggle">
            <button class="mode-btn active" id="btn-words" onclick="setMode('words')">WORDS</button>
            <button class="mode-btn" id="btn-phrases" onclick="setMode('phrases')">PHRASES</button>
        </div>
        <div class="flashcard-wrapper" onclick="this.classList.toggle('is-flipped')">
            <div class="flashcard-inner">
                <div class="card-front">
                    <h2 id="jp-text" style="font-size: 2.2rem; padding: 10px;">--</h2>
                    <button class="btn-main" style="width:auto; padding:8px 20px; font-size:0.7rem;" onclick="speakCurrent(); event.stopPropagation();">🔊 HEAR</button>
                </div>
                <div class="card-back">
                    <h2 id="en-text" style="font-size: 1.8rem; padding: 10px;">--</h2>
                    <div id="romaji-text" class="romaji">--</div>
                </div>
            </div>
        </div>
        <button class="btn-main" onclick="nextCard()">NEXT CARD →</button>
        <div id="deck-status" style="font-size:0.7rem; color:var(--text-dim); margin-top:10px;">Cards: 0</div>
    </div>

    <div id="watch" class="content-section">
        <h3>YouTube Immersion</h3>
        <a href="https://www.youtube.com/@JapaneseAmmoWithMisa/videos" target="_blank" class="video-link-card"><span>Japanese Ammo with Misa</span> ➔</a>
        <a href="https://www.youtube.com/@Dogen/videos" target="_blank" class="video-link-card"><span>Dogen (Pitch Accent)</span> ➔</a>
        <a href="https://www.youtube.com/results?search_query=japanese+vlog+no+talking" target="_blank" class="video-link-card"><span>Japanese Vlogs</span> ➔</a>
    </div>

    <div id="test" class="content-section">
        <div id="test-container" class="card">
            <h2 id="test-jp" style="font-size: 2.2rem;">--</h2>
            <input type="text" id="test-input" placeholder="Meaning in English..." onkeydown="if(event.key==='Enter') checkAnswer()">
            <button class="btn-main" onclick="checkAnswer()">SUBMIT</button>
            <p id="feedback" style="margin-top:10px;"></p>
        </div>
    </div>

    <div id="vault" class="content-section">
        <div class="card"><input type="text" id="v-jp" placeholder="Japanese"><input type="text" id="v-en" placeholder="English"><button class="btn-main" onclick="addToVault()">SAVE</button></div>
        <div id="vault-list" style="width:100%;"></div>
    </div>
</div>

<script>
    const library = {
        words: [
            {pt: "本", en: "Book", rj: "Hon"}, {pt: "水", en: "Water", rj: "Mizu"}, {pt: "学校", en: "School", rj: "Gak-kou"},
            {pt: "寿司", en: "Sushi", rj: "Sushi"}, {pt: "時計", en: "Watch/Clock", rj: "To-kei"}, {pt: "電話", en: "Phone", rj: "Den-wa"},
            {pt: "駅", en: "Station", rj: "Eki"}, {pt: "飛行機", en: "Airplane", rj: "Hi-kou-ki"}, {pt: "先生", en: "Teacher", rj: "Sen-sei"},
            {pt: "猫", en: "Cat", rj: "Neko"}, {pt: "犬", en: "Dog", rj: "Inu"}, {pt: "友達", en: "Friend", rj: "To-mo-da-chi"},
            {pt: "家族", en: "Family", rj: "Ka-zo-ku"}, {pt: "時間", en: "Time", rj: "Ji-kan"}, {pt: "今日", en: "Today", rj: "Kyou"},
            {pt: "明日", en: "Tomorrow", rj: "Ashita"}, {pt: "昨日", en: "Yesterday", rj: "Kinou"}
        ],
        phrases: [
            {pt: "お腹が空きました", en: "I am hungry", rj: "O-naka ga su-ki-ma-shi-ta"},
            {pt: "駅はどこですか？", en: "Where is the station?", rj: "Eki wa do-ko de-su ka?"},
            {pt: "お名前は何ですか？", en: "What is your name?", rj: "O-na-ma-e wa nan de-su ka?"},
            {pt: "日本料理が好きです", en: "I like Japanese food", rj: "Ni-hon ryou-ri ga su-ki de-su"},
            {pt: "すみません、わかりません", en: "Sorry, I don't understand", rj: "Su-mi-ma-sen, wa-ka-ri-ma-sen"},
            {pt: "これをください", en: "I will take this, please", rj: "Ko-re o ku-da-sai"},
            {pt: "トイレはどこですか？", en: "Where is the bathroom?", rj: "To-i-re wa do-ko de-su ka?"},
            {pt: "今、何時ですか？", en: "What time is it now?", rj: "Ima, nan-ji de-su ka?"},
            {pt: "はじめまして", en: "Nice to meet you", rj: "Ha-ji-me-ma-shi-te"},
            {pt: "いい天気ですね", en: "Good weather, isn't it?", rj: "I-i ten-ki de-su ne"}
        ]
    };

    let xp = parseInt(localStorage.getItem('pj_xp')) || 0;
    let vault = JSON.parse(localStorage.getItem('pj_vault')) || [];
    let currentMode = 'words'; let sessionDeck = [];

    function updateUI() {
        document.getElementById('xp-val').innerText = xp;
        document.getElementById('lvl-val').innerText = Math.floor(xp / 1000) + 1;
        document.getElementById('xp-bar').value = xp % 1000;
        localStorage.setItem('pj_xp', xp);
        localStorage.setItem('pj_vault', JSON.stringify(vault));
        renderVault();
    }

    function showTab(id, btn) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav .nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active'); btn.classList.add('active');
        if(id === 'test') startTest();
    }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('btn-words').classList.toggle('active', mode === 'words');
        document.getElementById('btn-phrases').classList.toggle('active', mode === 'phrases');
        sessionDeck = []; nextCard();
    }

    function nextCard() {
        if (sessionDeck.length === 0) {
            sessionDeck = [...library[currentMode], ...vault].sort(() => Math.random() - 0.5);
        }
        const card = sessionDeck.pop();
        document.getElementById('deck-status').innerText = `Cards in cycle: ${sessionDeck.length + 1}`;
        document.querySelector('.flashcard-wrapper').classList.remove('is-flipped');
        setTimeout(() => {
            document.getElementById('jp-text').innerText = card.pt;
            document.getElementById('en-text').innerText = card.en;
            document.getElementById('romaji-text').innerText = card.rj || "Custom Entry";
        }, 150);
    }

    function speakCurrent() {
        const ut = new SpeechSynthesisUtterance(document.getElementById('jp-text').innerText);
        const voices = window.speechSynthesis.getVoices();
        ut.voice = voices.find(v => v.lang.includes('ja-JP')) || voices.find(v => v.lang.includes('ja'));
        ut.lang = 'ja-JP'; ut.rate = 0.8;
        window.speechSynthesis.cancel(); window.speechSynthesis.speak(ut);
    }

    function startTest() {
        const full = [...library.words, ...library.phrases, ...vault];
        window.currentTest = full[Math.floor(Math.random() * full.length)];
        document.getElementById('test-jp').innerText = window.currentTest.pt;
        document.getElementById('test-input').value = "";
        document.getElementById('feedback').innerText = "";
    }

    function checkAnswer() {
        if(document.getElementById('test-input').value.trim().toLowerCase() === window.currentTest.en.toLowerCase()) {
            xp += 20; updateUI(); document.getElementById('feedback').innerText = "Correct! +20 XP"; setTimeout(startTest, 1200);
        } else {
            document.getElementById('feedback').innerText = `Answer: ${window.currentTest.en}`;
        }
    }

    function addToVault() {
        const jp = document.getElementById('v-jp').value, en = document.getElementById('v-en').value;
        if(jp && en) { vault.push({pt: jp, en: en, rj: "Custom"}); xp += 15; updateUI(); }
    }

    function renderVault() {
        document.getElementById('vault-list').innerHTML = vault.map(i => `<div class="stat-box" style="margin-bottom:5px;">${i.pt}</div>`).join('');
    }

    updateUI(); nextCard();
</script>
</body>
</html>
