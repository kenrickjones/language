<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Proyecto Sol | Spanish</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="spanish_vault.js"></script>
    <style>
        /* Theme updated to Spanish Orange (#f59e0b) */
        :root{--bg:#0f172a;--card:#1e293b;--primary:#f59e0b;--shadow:#b45309;--text:#f8fafc;--text-dim:#94a3b8;--border:#334155;}
        *{box-sizing:border-box;transition:all 0.2s ease;-webkit-tap-highlight-color:transparent;}
        body{font-family:'Inter',sans-serif;background-color:var(--bg);color:var(--text);margin:0;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding-top:env(safe-area-inset-top);}
        
        /* Navigation & Containers */
        .top-nav{width:100%;display:flex;padding:12px 15px;background:rgba(15,23,42,0.95);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);}
        .home-link{text-decoration:none;color:var(--text-dim);font-size:0.75rem;font-weight:800;border:1px solid var(--border);padding:6px 14px;border-radius:20px;background:var(--card);}
        .app-container{max-width:600px;width:92%;display:flex;flex-direction:column;align-items:center;padding-bottom:50px;}
        header{width:100%;text-align:center;padding:25px 0;}
        nav{display:flex;background:var(--card);padding:4px;border-radius:12px;gap:4px;margin-bottom:20px;width:100%;border:1px solid var(--border);}
        .nav-btn{flex:1;padding:10px 2px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;border-radius:8px;font-weight:700;font-size:0.65rem;}
        .nav-btn.active{background:var(--primary);color:white;}
        
        /* Content Sections */
        .content-section{display:none;width:100%;flex-direction:column;align-items:center;}
        .content-section.active{display:flex;animation:fadeIn 0.3s ease;}
        
        /* Category Scroller */
        .cat-scroll-wrap{width:100%;overflow-x:auto;overflow-y:visible;margin-bottom:15px;-webkit-overflow-scrolling:touch;scrollbar-width:none;min-width:0;}
        .cat-scroll-wrap::-webkit-scrollbar{display:none;}
        .cat-scroll{display:flex;gap:8px;padding:4px 2px;width:max-content;}
        .cat-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 14px;background:var(--card);border:2px solid var(--border);border-radius:14px;cursor:pointer;color:var(--text-dim);font-size:0.6rem;font-weight:800;text-transform:uppercase;letter-spacing:0.04em;white-space:nowrap;}
        .cat-btn .cat-icon{font-size:1.4rem;line-height:1;}
        .cat-btn.active{border-color:var(--primary);color:var(--primary);background:rgba(245,158,11,0.08);}

        /* Flashcards */
        .flashcard-wrapper{perspective:1000px;width:100%;height:340px;cursor:pointer;margin:10px 0 15px 0;}
        .flashcard-inner{position:relative;width:100%;height:100%;transition:transform 0.5s;transform-style:preserve-3d;}
        .flashcard-wrapper.is-flipped .flashcard-inner{transform:rotateY(180deg);}
        .card-front,.card-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:24px;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:25px;border:2px solid var(--primary);text-align:center;background:var(--card);}
        .card-back{background:var(--primary);transform:rotateY(180deg);color:white;}
        .btn-hear{background:rgba(255,255,255,0.1);border:1px solid var(--primary);color:var(--primary);padding:8px 15px;border-radius:20px;font-size:0.7rem;font-weight:800;margin-top:15px;cursor:pointer;}
        .card-back .btn-hear{border-color:white;color:white;}
        .pronunciation{font-size:0.9rem;font-style:italic;color:#fef3c7;margin-top:8px;}
        .card-counter{font-size:0.7rem;font-weight:800;color:var(--text-dim);margin-top:10px;}

        /* Buttons & Navigation */
        .card-nav{display:flex;gap:10px;width:100%;margin-top:8px;}
        .btn-prev{flex:1;padding:14px;background:var(--card);color:var(--text-dim);border:1px solid var(--border);border-radius:14px;font-weight:800;cursor:pointer;font-size:0.85rem;}
        .btn-next{flex:2;padding:14px;background:var(--primary);color:white;border:none;border-radius:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 var(--shadow);font-size:0.85rem;}
        
        /* List & Results Styles */
        .list-native{font-size:1.25rem;font-weight:700;color:var(--text);}
        .result-row.r-correct{border-left:4px solid #22c55e;}
        .result-row.r-wrong{border-left:4px solid #ef4444;}
        
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    </style>
</head>
<body>
    <div class="top-nav">
        <a href="index.html" class="home-link">← HUB</a>
    </div>

    <div class="app-container">
        <header>
            <h1 style="margin:0;font-weight:800;letter-spacing:-0.02em;">Proyecto Sol</h1>
            <p style="margin:5px 0 0;color:var(--text-dim);font-weight:600;font-size:0.9rem;">Spanish Learning Vault</p>
        </header>

        <nav>
            <button class="nav-btn active" onclick="showTab('words',this)">WORDS</button>
            <button class="nav-btn" onclick="showTab('list',this)">LIST</button>
            <button class="nav-btn" onclick="showTab('test',this)">TEST</button>
        </nav>

        <section id="words" class="content-section active">
            <div class="cat-scroll-wrap">
                <div id="words-cat-scroll" class="cat-scroll"></div>
            </div>
            <div class="flashcard-wrapper" onclick="this.classList.toggle('is-flipped')">
                <div class="flashcard-inner">
                    <div class="card-front">
                        <div id="card-q" style="font-size:2.8rem;font-weight:800;">Hola</div>
                        <div id="card-ph" class="pronunciation">O-la</div>
                        <button class="btn-hear" onclick="event.stopPropagation();speakText('card-q','es-ES')">HEAR</button>
                    </div>
                    <div class="card-back">
                        <div id="card-a" style="font-size:1.8rem;font-weight:700;">Hello</div>
                        <button class="btn-hear" onclick="event.stopPropagation();speakText('card-a','en-US')">HEAR</button>
                    </div>
                </div>
            </div>
            <div class="card-counter"><span id="card-current">1</span> / <span id="card-total">0</span></div>
            <div class="card-nav">
                <button class="btn-prev" onclick="prevCard()">PREV</button>
                <button class="btn-next" onclick="nextCard()">NEXT</button>
            </div>
        </section>

        </div>

    <script>
        // Use the library from spanish_vault.js
        const library = SPANISH_LIBRARY;
        let currentCat = Object.keys(library.words.easy)[0] || 'all';
        let currentIndex = 0;

        function speakText(id, lang) {
            const text = document.getElementById(id).innerText;
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = lang;
            speechSynthesis.speak(ut);
        }

        function showTab(id, btn) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        // Initialize with Spanish logic
        window.onload = () => {
            console.log("Spanish module initialized.");
            // Further logic to load categories from library...
        };
    </script>
</body>
</html>
