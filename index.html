<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Polyglot Hub | Learn</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --pt-color: #22c55e;
            --jp-color: #f472b6;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }

        /* Header Area */
        header {
            padding: 40px 20px 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: -1.5px;
            background: linear-gradient(to right, #fff, var(--text-dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-top: 8px;
        }

        /* Visibility Toggles */
        .filter-section {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            padding: 0 20px;
        }

        .toggle-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .toggle-btn.active {
            border-color: var(--text);
            background: var(--text);
            color: var(--bg);
        }

        /* Scrollable Grid Container */
        .main-content {
            flex: 1; /* Pushes footer down */
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 0 20px 40px; /* Bottom padding prevents tile hitting links */
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }

        .lang-card {
            text-decoration: none;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
            overflow: hidden;
        }

        .lang-card:active { transform: scale(0.97); }

        .lang-card.hidden { display: none; }

        .lang-card.portuguese { border-bottom: 6px solid var(--pt-color); }
        .lang-card.japanese { border-bottom: 6px solid var(--jp-color); }

        .flag { font-size: 3rem; margin-bottom: 15px; }
        .lang-name { font-size: 1.4rem; font-weight: 800; color: white; margin-bottom: 5px; }
        .project-name { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); }

        /* Footer Links */
        footer {
            padding: 20px;
            text-align: center;
            border-top: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
        }

        .footer-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .footer-link:hover { color: white; }

        @media (min-width: 768px) {
            .grid { grid-template-columns: 1fr 1fr; max-width: 800px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>POLYGLOT <span style="color:var(--pt-color)">HUB</span></h1>
        <p class="subtitle">Choose your challenge</p>
    </header>

    <div class="filter-section">
        <button class="toggle-btn active" id="btn-pt" onclick="toggleLang('portuguese', 'btn-pt')">Portuguese</button>
        <button class="toggle-btn active" id="btn-jp" onclick="toggleLang('japanese', 'btn-jp')">Japanese</button>
    </div>

    <main class="main-content">
        <div class="grid">
            <a href="portuguese.html" class="lang-card portuguese" id="card-portuguese">
                <span class="flag">🇧🇷</span>
                <span class="lang-name">Portuguese</span>
                <span class="project-name">Projeto Samba</span>
            </a>

            <a href="japanese.html" class="lang-card japanese" id="card-japanese">
                <span class="flag">🇯🇵</span>
                <span class="lang-name">Japanese</span>
                <span class="project-name">Project Sakura</span>
            </a>
        </div>
    </main>

    <footer>
        <a href="https://yourwebsite.com" class="footer-link">Visit Official Website →</a>
    </footer>

    <script>
        function toggleLang(langId, btnId) {
            const card = document.getElementById('card-' + langId);
            const btn = document.getElementById(btnId);
            
            card.classList.toggle('hidden');
            btn.classList.toggle('active');
        }
    </script>
</body>
</html>
