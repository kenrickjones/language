<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Language Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --pt-color: #22c55e;
            --jp-color: #f472b6;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* Extra bottom padding for iPhone home bar */
            padding: env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 20px) 0;
        }

        header {
            padding: 50px 20px 30px;
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: -1px;
        }

        /* Language Toggle Area */
        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .toggle-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
        }

        .toggle-btn.active {
            border-color: var(--text);
            color: var(--text);
            background: #2d3e5a;
        }

        /* Main Content with scrolling */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px;
            overflow-y: auto;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }

        .tile {
            text-decoration: none;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 24px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.2s;
        }

        .tile:active { transform: scale(0.96); }
        .tile.hidden { display: none; }

        .tile.portuguese { border-color: var(--pt-color); }
        .tile.japanese { border-color: var(--jp-color); }

        .flag { font-size: 3.5rem; margin-bottom: 10px; }
        .title-text { font-size: 1.5rem; font-weight: 800; color: white; margin: 0; }
        .sub-text { font-size: 0.8rem; color: var(--text-dim); margin-top: 5px; }

        footer {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-dim);
            font-weight: 600;
            font-size: 0.9rem;
        }

        @media (min-width: 768px) {
            .grid { grid-template-columns: 1fr 1fr; max-width: 700px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Language Learning</h1>
    </header>

    <div class="controls">
        <button class="toggle-btn active" id="t-pt" onclick="toggle('pt')">Portuguese</button>
        <button class="toggle-btn active" id="t-jp" onclick="toggle('jp')">Japanese</button>
    </div>

    <main>
        <div class="grid">
            <a href="portuguese.html" class="tile portuguese" id="card-pt">
                <span class="flag">🇧🇷</span>
                <p class="title-text">Projeto Samba</p>
                <p class="sub-text">Portuguese</p>
            </a>

            <a href="japanese.html" class="tile japanese" id="card-jp">
                <span class="flag">🇯🇵</span>
                <p class="title-text">Project Sakura</p>
                <p class="sub-text">Japanese</p>
            </a>
        </div>
    </main>

    <footer>
        Created by Kenny!
    </footer>

    <script>
        function toggle(id) {
            document.getElementById('card-' + id).classList.toggle('hidden');
            document.getElementById('t-' + id).classList.toggle('active');
        }
    </script>
</body>
</html>
