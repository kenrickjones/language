<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Language Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --text: #f8fafc;
            --pt: #22c55e;
            --jp: #f472b6;
            --es: #f59e0b;
        }

        * { box-sizing: border-box; transition: transform 0.2s ease; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin: 0;
            color: var(--text);
        }

        .header p {
            color: #64748b;
            font-weight: 600;
            margin-top: 8px;
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }

        .lang-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 24px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .lang-card:active {
            transform: scale(0.97);
        }

        .lang-info h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
        }

        .lang-info p {
            margin: 4px 0 0 0;
            color: #94a3b8;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Accent Borders */
        .card-pt { border-left: 6px solid var(--pt); }
        .card-jp { border-left: 6px solid var(--jp); }
        .card-es { border-left: 6px solid var(--es); }

        .emoji {
            font-size: 2.2rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Language Hub</h1>
        <p>Select your Language</p>
    </div>

    <div class="grid">
        <a href="portuguese.html" class="lang-card card-pt">
            <div class="lang-info">
                <h2>Learn Portuguese</h2>
                <p>Projeto Samba</p>
            </div>
            <div class="emoji">🇧🇷</div>
        </a>

        <a href="japanese.html" class="lang-card card-jp">
            <div class="lang-info">
                <h2>Learn Japanese</h2>
                <p>Project Sakura</p>
            </div>
            <div class="emoji">🇯🇵</div>
        </a>

        <a href="spanish.html" class="lang-card card-es">
            <div class="lang-info">
                <h2>Learn Spanish</h2>
                <p>Proyecto Sol</p>
            </div>
            <div class="emoji">🇪🇸</div>
        </a>
    </div>

</body>
</html>
